<!-- @dsCard group="Components" name="Prose (markdown)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--ivory:#FAF9F5;--slate:#141413;--clay:#D97757;--clay-d:#B85C3E;--oat:#E3DACC;--g100:#F0EEE6;--g200:#E6E3DA;--g300:#D1CFC5;--g500:#87867F;--g700:#3D3D3A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:var(--g700);font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;padding:32px}
.prose{max-width:680px;font-size:15px;line-height:1.8}
.prose p{margin:0 0 20px}
.prose h2{font-size:21px;color:var(--slate);letter-spacing:-.3px;margin:0 0 16px}
.prose h2::before{content:"## ";color:var(--g300);font-weight:500}
.prose a{color:var(--clay-d);text-decoration:underline;text-decoration-color:var(--oat);text-underline-offset:3px}
.prose blockquote{border-left:3px solid var(--oat);padding:4px 0 4px 20px;color:var(--g500);margin:0 0 20px}
.prose code{background:var(--g100);border:1px solid var(--g200);border-radius:4px;padding:1.5px 6px;font-size:13.5px}
.prose pre{border:1.5px solid var(--g300);border-radius:10px;padding:20px 24px;margin:0 0 24px;overflow-x:auto;font-size:13.5px;line-height:1.65;background:#fff}
.prose pre code{background:none;border:none;padding:0}
.prose li::marker{color:var(--clay)}
.prose ul{margin:0 0 20px 24px}
.k{color:#1c6b48}.f{color:#8f4c38}.c{color:#a0a0a0;font-style:italic}
</style></head><body>
<article class="prose">
<h2>Section heading</h2>
<p>Body text with an <a href="#">inline link</a>, some <code>inline code</code>, and a keyword-dense sentence about <strong style="color:var(--slate)">verkle proofs</strong>.</p>
<blockquote><p style="margin:0"><em>Blockquote — used for archival notes and citations.</em></p></blockquote>
<ul><li>list marker in clay</li><li>second item</li></ul>
<pre><code><span class="c">-- shiki: vitesse-light</span>
<span class="k">theorem</span> <span class="f">add_zero</span> (n : Nat) : n + 0 = n := rfl</code></pre>
</article>
</body></html>
