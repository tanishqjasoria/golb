<!-- @dsCard group="Diagrams" name="Diagram style" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;background:#FAF9F5;padding:20px}svg{display:block;max-width:900px;margin:0 auto}</style></head><body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="1200" height="580" rx="12" fill="#FAF9F5"/>

  <!-- root -->
  <circle cx="600" cy="70" r="17" fill="#788C5D" stroke="#141413" stroke-width="1.5"/>
  <text x="600" y="40" text-anchor="middle" font-size="12" fill="#141413">root</text>

  <!-- edges root -> subtree roots -->
  <line x1="600" y1="87" x2="240" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="600" y1="87" x2="420" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="600" y1="87" x2="600" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="600" y1="87" x2="780" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>
  <line x1="600" y1="87" x2="960" y2="168" stroke="#D1CFC5" stroke-width="1.5"/>

  <!-- served-range shading (middle subtrees) -->
  <path d="M 420 186 L 500 420 L 340 420 Z" fill="#E3DACC" opacity="0.55"/>
  <path d="M 600 186 L 680 420 L 520 420 Z" fill="#E3DACC" opacity="0.55"/>
  <path d="M 780 186 L 860 420 L 700 420 Z" fill="#E3DACC" opacity="0.55"/>

  <!-- subtree dotted triangles -->
  <g fill="none" stroke="#87867F" stroke-width="1.5" stroke-dasharray="6 5">
    <path d="M 240 186 L 320 420 L 160 420 Z"/>
    <path d="M 420 186 L 500 420 L 340 420 Z"/>
    <path d="M 600 186 L 680 420 L 520 420 Z"/>
    <path d="M 780 186 L 860 420 L 700 420 Z"/>
    <path d="M 960 186 L 1040 420 L 880 420 Z"/>
  </g>

  <!-- subtree root nodes -->
  <circle cx="240" cy="170" r="14" fill="#788C5D" stroke="#141413" stroke-width="1.5"/>
  <circle cx="420" cy="170" r="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="600" cy="170" r="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="780" cy="170" r="14" fill="#FFFFFF" stroke="#D1CFC5" stroke-width="1.5"/>
  <circle cx="960" cy="170" r="14" fill="#788C5D" stroke="#141413" stroke-width="1.5"/>

  <!-- boundary labels -->
  <text x="240" y="110" text-anchor="middle" font-size="12" fill="#141413">left boundary</text>
  <text x="240" y="126" text-anchor="middle" font-size="11" fill="#87867F">proves startingStem,</text>
  <text x="240" y="140" text-anchor="middle" font-size="11" fill="#87867F">even if it does not exist</text>
  <text x="960" y="110" text-anchor="middle" font-size="12" fill="#141413">right boundary</text>
  <text x="960" y="126" text-anchor="middle" font-size="11" fill="#87867F">proves the last</text>
  <text x="960" y="140" text-anchor="middle" font-size="11" fill="#87867F">returned subtree</text>

  <!-- served range bracket -->
  <line x1="340" y1="446" x2="860" y2="446" stroke="#B85C3E" stroke-width="1.5"/>
  <line x1="340" y1="440" x2="340" y2="452" stroke="#B85C3E" stroke-width="1.5"/>
  <line x1="860" y1="440" x2="860" y2="452" stroke="#B85C3E" stroke-width="1.5"/>
  <text x="326" y="450" text-anchor="end" font-size="11" fill="#87867F">startingStem</text>
  <text x="874" y="450" text-anchor="start" font-size="11" fill="#87867F">limitStem</text>
  <text x="600" y="476" text-anchor="middle" font-size="12" fill="#B85C3E">served range — complete suffix trees, no per-node proofs needed</text>

  <!-- legend -->
  <g font-size="12" fill="#87867F">
    <circle cx="238" cy="530" r="8" fill="#788C5D" stroke="#141413" stroke-width="1.5"/>
    <text x="256" y="534" fill="#3D3D3A">node in the verkle proof</text>
    <path d="M 490 522 L 502 538 L 478 538 Z" fill="none" stroke="#87867F" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="514" y="534" fill="#3D3D3A">subtree (compact verkle tree)</text>
    <rect x="772" y="522" width="16" height="16" rx="3" fill="#E3DACC"/>
    <text x="796" y="534" fill="#3D3D3A">data served in the range</text>
  </g>
</svg>
</body></html>
